name: gh-runner
description: >-
  Containerized GitHub Actions self-hosted runner with s6 process supervision,
  non-root defaults, and ephemeral mode support. Features automatic token
  generation via GitHub PAT, Docker-in-Docker support, and built-in health
  monitoring for CI/CD workloads on IoT and edge devices.
post-provisioning: >-
  ## Usage instructions

  Include this snippet in your docker-compose.yml file under 'services':

    ```
    gh-runner:
      image: blackoutsecure/docker-github-runner:latest
      restart: unless-stopped
      environment:
        - TZ=Etc/UTC
        - RUNNER_URL=https://github.com/OWNER/REPO
        - RUNNER_TOKEN=YOUR_REGISTRATION_TOKEN
        - RUNNER_NAME=my-runner
        - LOG_LEVEL=info
      volumes:
        - '/path/to/runner/config:/config'
        - '/var/run/docker.sock:/var/run/docker.sock'
      security_opt:
        - 'no-new-privileges:true'
    ```

  Repository: https://github.com/blackoutsecure/docker-github-runner
  Upstream application: https://github.com/actions/runner

version: 2.333.1
type: sw.block
assets:
  repository:
    type: blob.asset
    data:
      url: 'https://github.com/blackoutsecure/docker-github-runner'
data:
  defaultDeviceType: raspberrypi3-64
  supportedDeviceTypes:
    - raspberrypi3
    - raspberrypi3-64
    - raspberrypi4
    - raspberrypi4-64
    - raspberrypi400
    - raspberrypi400-64
    - intel-nuc
    - genericx86-64-ext
